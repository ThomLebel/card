<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thomas Lebel — Intégrateur Web Freelance</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0F1A;
      --text: #F0F4FF;
      --text-muted: rgba(240,244,255,0.45);
      --accent-green: #00F5A0;
      --accent-blue: #0080FF;
      --accent-cyan: #00C8FF;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
    }

    /* Blobs */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--accent-green);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--accent-blue);
      bottom: -100px; right: -80px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: var(--accent-cyan);
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.15;
      animation-delay: -8s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      background: var(--card-bg);
      border: none;
      border-radius: 0;
      padding: 48px 28px 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 520px) {
      body { padding: 40px 20px; align-items: center; height: auto; min-height: 100%; }
      .card {
        width: 100%;
        max-width: 480px;
        height: auto;
        border-radius: 32px;
        border: 1px solid var(--card-border);
        padding: 48px 40px 40px;
        display: block;
      }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan), var(--accent-blue));
    }
    @media (min-width: 520px) {
      .card::before { left: 40px; right: 40px; border-radius: 0 0 2px 2px; }
    }

    /* Header */
    .eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-cyan);
      margin-bottom: 10px;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .name span {
      display: block;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 0;
      letter-spacing: 0.3px;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-green), transparent);
      border-radius: 2px;
      margin: 16px 0;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      justify-content: center;
      margin-bottom: 16px;
    }

    @media (min-width: 520px) {
      .eyebrow { margin-bottom: 16px; }
      .name { font-size: clamp(32px, 8vw, 42px); margin-bottom: 10px; }
      .title { margin-bottom: 36px; font-size: 13px; }
      .divider { margin: 0 0 32px; }
      .links { flex: none; gap: 10px; margin-bottom: 36px; justify-content: flex-start; }
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 13.5px;
      font-weight: 400;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    @media (min-width: 520px) {
      .link-item { padding: 14px 18px; }
    }
    .link-item:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(0,245,160,0.2);
      transform: translateX(4px);
    }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg {
      width: 16px;
      height: 16px;
    }

    .icon-site   { background: rgba(0,245,160,0.12); color: var(--accent-green); }
    .icon-malt   { background: rgba(255,90,60,0.12);  color: #FF6B4A; }
    .icon-li     { background: rgba(0,128,255,0.12);  color: var(--accent-blue); }
    .icon-phone  { background: rgba(0,200,255,0.12);  color: var(--accent-cyan); }
    .icon-mail   { background: rgba(0,245,160,0.08);  color: var(--accent-green); }

    .link-label {
      font-family: 'Inter', sans-serif;
      letter-spacing: 0;
    }
    .link-sub {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Skills tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
    .tag.green { border-color: rgba(0,245,160,0.3); color: var(--accent-green); }
    .tag.blue  { border-color: rgba(0,128,255,0.3); color: var(--accent-blue); }
    .tag.cyan  { border-color: rgba(0,200,255,0.3); color: var(--accent-cyan); }
  </style>
</head>
